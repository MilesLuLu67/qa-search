<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模擬問答搜尋系統</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Microsoft JhengHei", "微軟正黑體", sans-serif;
            background: #f0f2f5;
            color: #333;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #1a5276, #2980b9);
            color: white;
            padding: 24px 20px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .header .subtitle {
            font-size: 14px;
            opacity: 0.85;
        }

        .header-actions {
            margin-top: 10px;
        }

        .btn-update {
            display: inline-block;
            padding: 6px 18px;
            font-size: 13px;
            font-weight: 600;
            color: #2980b9;
            background: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-update:hover {
            background: #e8f4fd;
        }

        .btn-update:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-share {
            display: inline-block;
            padding: 6px 18px;
            font-size: 13px;
            font-weight: 600;
            color: #1a5276;
            background: rgba(255,255,255,0.7);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-left: 8px;
            transition: background 0.2s;
        }

        .btn-share:hover {
            background: white;
        }

        /* QR Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-box {
            background: white;
            border-radius: 16px;
            padding: 32px;
            text-align: center;
            max-width: 360px;
            width: 90%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        .modal-box h3 {
            font-size: 18px;
            margin-bottom: 8px;
            color: #1a5276;
        }

        .modal-box .url-text {
            font-size: 20px;
            font-weight: 700;
            color: #2980b9;
            margin: 16px 0;
            word-break: break-all;
            user-select: all;
        }

        .modal-box .hint {
            font-size: 13px;
            color: #888;
            margin-top: 12px;
        }

        .modal-box .qr-img {
            margin: 16px auto;
        }

        .modal-close {
            margin-top: 16px;
            padding: 8px 32px;
            font-size: 14px;
            border: none;
            border-radius: 8px;
            background: #e0e0e0;
            cursor: pointer;
        }

        .modal-close:hover {
            background: #ccc;
        }

        .search-area {
            max-width: 900px;
            margin: -28px auto 0;
            padding: 0 16px;
            position: relative;
            z-index: 10;
        }

        .search-box {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }

        .search-row {
            display: flex;
            gap: 10px;
            align-items: stretch;
        }

        .search-input {
            flex: 1;
            padding: 12px 16px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: #2980b9;
        }

        .search-input::placeholder {
            color: #aaa;
        }

        .btn {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn-primary {
            background: #2980b9;
            color: white;
        }

        .btn-primary:hover {
            background: #1a6fa0;
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #555;
        }

        .btn-secondary:hover {
            background: #ccc;
        }

        .filter-row {
            margin-top: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .filter-label {
            font-size: 14px;
            color: #666;
            margin-right: 4px;
        }

        .dept-tag {
            display: inline-block;
            padding: 4px 12px;
            font-size: 13px;
            border-radius: 20px;
            border: 1px solid #ccc;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .dept-tag:hover {
            border-color: #2980b9;
            color: #2980b9;
        }

        .dept-tag.active {
            background: #2980b9;
            color: white;
            border-color: #2980b9;
        }

        .stats {
            max-width: 900px;
            margin: 16px auto 0;
            padding: 0 16px;
            font-size: 14px;
            color: #777;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .results {
            max-width: 900px;
            margin: 12px auto 40px;
            padding: 0 16px;
        }

        .result-card {
            background: white;
            border-radius: 10px;
            margin-bottom: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            overflow: hidden;
            transition: box-shadow 0.2s;
        }

        .result-card:hover {
            box-shadow: 0 2px 12px rgba(0,0,0,0.12);
        }

        .result-header {
            padding: 16px 20px;
            cursor: pointer;
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .result-header:hover {
            background: #f8f9fa;
        }

        .result-number {
            background: #2980b9;
            color: white;
            font-size: 12px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 6px;
            white-space: nowrap;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .result-dept {
            background: #e8f4fd;
            color: #1a5276;
            font-size: 12px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 6px;
            white-space: nowrap;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .result-title {
            flex: 1;
            font-size: 15px;
            line-height: 1.5;
            color: #222;
        }

        .result-title mark {
            background: #fff3cd;
            color: #333;
            padding: 0 2px;
            border-radius: 2px;
        }

        .result-toggle {
            flex-shrink: 0;
            font-size: 18px;
            color: #aaa;
            transition: transform 0.3s;
            margin-top: 2px;
        }

        .result-card.open .result-toggle {
            transform: rotate(180deg);
        }

        .result-content {
            display: none;
            padding: 0 20px 20px;
            border-top: 1px solid #eee;
            margin: 0 20px;
        }

        .result-card.open .result-content {
            display: block;
        }

        /* === Rich content styles === */
        .result-content-body {
            font-size: 14px;
            line-height: 1.9;
            color: #333;
            margin-top: 16px;
        }

        .result-content-body .qa-title {
            font-size: 16px;
            font-weight: 700;
            color: #1a5276;
            margin-bottom: 14px;
            padding-bottom: 10px;
            border-bottom: 2px solid #2980b9;
        }

        .result-content-body .qa-line {
            margin: 4px 0;
            text-align: justify;
        }

        .result-content-body .indent-1 {
            padding-left: 2em;
        }

        .result-content-body .indent-2 {
            padding-left: 4em;
        }

        .result-content-body .indent-3 {
            padding-left: 6em;
        }

        /* Bold */
        .result-content-body .b {
            font-weight: 700;
        }

        /* Red highlight */
        .result-content-body .red {
            color: #d32f2f;
        }

        /* Blue section header */
        .result-content-body .blue {
            color: #1565c0;
        }

        /* Underline */
        .result-content-body .u {
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        /* Tables */
        .result-content-body .qa-table {
            width: 100%;
            border-collapse: collapse;
            margin: 12px 0;
            font-size: 13px;
        }

        .result-content-body .qa-table th,
        .result-content-body .qa-table td {
            border: 1px solid #ccc;
            padding: 8px 10px;
            text-align: left;
            vertical-align: top;
        }

        .result-content-body .qa-table th {
            background: #e8f4fd;
            font-weight: 700;
            color: #1a5276;
        }

        .result-content-body .qa-table tr:nth-child(even) {
            background: #fafafa;
        }

        /* Search highlight in rich content */
        .result-content-body mark {
            background: #fff3cd;
            color: inherit;
            padding: 0 2px;
            border-radius: 2px;
        }

        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .no-results .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .keyboard-hint {
            font-size: 12px;
            color: #aaa;
            margin-top: 8px;
        }

        @media (max-width: 600px) {
            .header h1 { font-size: 20px; }
            .search-row { flex-direction: column; }
            .btn { width: 100%; }
            .result-header { padding: 12px 14px; }
            .result-content { margin: 0 14px; padding: 0 14px 14px; }
            .result-content-body .indent-1 { padding-left: 1em; }
            .result-content-body .indent-2 { padding-left: 2em; }
            .result-content-body .indent-3 { padding-left: 3em; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>4-7 模擬問答搜尋系統</h1>
        <div class="subtitle">新北市政府教育局 府會聯絡</div>
        <div class="header-actions">
            <button class="btn-update" id="btnUpdate" onclick="updateData()">&#x1f504; 重新轉檔（更新資料）</button>
            <button class="btn-share" id="btnShare" onclick="showShareModal()">&#128241; 手機連線</button>
        </div>
    </div>

    <!-- Share Modal -->
    <div class="modal-overlay" id="shareModal" onclick="closeShareModal(event)">
        <div class="modal-box">
            <h3>&#128241; 手機 / 平板連線</h3>
            <p>請確保在同一個 Wi-Fi 網路下</p>
            <div class="url-text" id="shareUrl">載入中...</div>
            <div class="qr-img" id="qrImg"></div>
            <div class="hint">用手機掃描 QR Code 或直接輸入上方網址</div>
            <button class="modal-close" onclick="closeShareModal()">關閉</button>
        </div>
    </div>

    <div class="search-area">
        <div class="search-box">
            <div class="search-row">
                <input type="text" class="search-input" id="searchInput"
                    placeholder="輸入關鍵字搜尋（如：雙語、霸凌、議員姓名...）"
                    autocomplete="off">
                <button class="btn btn-primary" onclick="doSearch()">搜尋</button>
                <button class="btn btn-secondary" onclick="clearSearch()">清除</button>
            </div>
            <div class="filter-row" id="filterRow">
                <span class="filter-label">科室篩選：</span>
            </div>
            <div class="keyboard-hint">按 Enter 搜尋 ｜ 可輸入多個關鍵字，以空格分隔</div>
        </div>
    </div>

    <div class="stats" id="stats"></div>

    <div class="results" id="results">
        <div class="loading" id="loading">載入資料中...</div>
    </div>

    <script src="data.js"></script>
    <script>
        // State
        let activeDept = '';
        let currentResults = [];

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            buildDeptFilter();
            showAllResults();
            document.getElementById('searchInput').addEventListener('keydown', e => {
                if (e.key === 'Enter') doSearch();
            });
            document.getElementById('searchInput').focus();
            document.getElementById('loading').style.display = 'none';
        });

        function buildDeptFilter() {
            const depts = {};
            QA_DATA.forEach(item => {
                const key = item.dept || item.dept_code;
                if (key) depts[key] = (depts[key] || 0) + 1;
            });

            const row = document.getElementById('filterRow');
            const allTag = createDeptTag('全部', QA_DATA.length, '');
            allTag.classList.add('active');
            row.appendChild(allTag);

            const sorted = Object.entries(depts).sort((a, b) => b[1] - a[1]);
            sorted.forEach(([dept, count]) => {
                row.appendChild(createDeptTag(dept, count, dept));
            });
        }

        function createDeptTag(label, count, value) {
            const tag = document.createElement('span');
            tag.className = 'dept-tag';
            tag.textContent = `${label} (${count})`;
            tag.dataset.dept = value;
            tag.onclick = () => {
                document.querySelectorAll('.dept-tag').forEach(t => t.classList.remove('active'));
                tag.classList.add('active');
                activeDept = value;
                doSearch();
            };
            return tag;
        }

        function doSearch() {
            const query = document.getElementById('searchInput').value.trim();
            const keywords = query ? query.split(/\s+/).filter(k => k) : [];

            let results = QA_DATA;

            // Filter by dept
            if (activeDept) {
                results = results.filter(item =>
                    item.dept === activeDept || item.dept_code === activeDept
                );
            }

            // Filter by keywords (AND logic) - search in plain text
            if (keywords.length > 0) {
                results = results.filter(item => {
                    const text = (item.title + ' ' + item.plain + ' ' + item.dept + ' ' + item.filename).toLowerCase();
                    return keywords.every(kw => text.includes(kw.toLowerCase()));
                });
            }

            currentResults = results;
            renderResults(results, keywords);
        }

        function showAllResults() {
            currentResults = QA_DATA;
            renderResults(QA_DATA, []);
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            activeDept = '';
            document.querySelectorAll('.dept-tag').forEach(t => t.classList.remove('active'));
            document.querySelector('.dept-tag').classList.add('active');
            showAllResults();
            document.getElementById('searchInput').focus();
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function escapeRegex(str) {
            return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        function highlightPlainText(text, keywords) {
            if (!keywords.length) return escapeHtml(text);
            let result = escapeHtml(text);
            keywords.forEach(kw => {
                const escaped = escapeRegex(escapeHtml(kw));
                const regex = new RegExp(`(${escaped})`, 'gi');
                result = result.replace(regex, '<mark>$1</mark>');
            });
            return result;
        }

        function highlightRichHtml(html, keywords) {
            // Highlight keywords in rich HTML without breaking tags
            if (!keywords.length || !html) return html;
            let result = html;
            keywords.forEach(kw => {
                const escaped = escapeRegex(kw);
                // Only highlight text outside of HTML tags
                result = result.replace(
                    new RegExp(`(>[^<]*?)(?=${escaped})`, 'gi'),
                    (match) => match
                );
                // Use a safe approach: split by tags, highlight text parts only
            });
            // Safer approach: process text nodes only
            result = html.replace(/(?<=>)([^<]+)(?=<)/g, (textNode) => {
                let highlighted = textNode;
                keywords.forEach(kw => {
                    const escaped = escapeRegex(kw);
                    highlighted = highlighted.replace(
                        new RegExp(`(${escaped})`, 'gi'),
                        '<mark>$1</mark>'
                    );
                });
                return highlighted;
            });
            // Also handle text at the very start (before first tag) and end (after last tag)
            if (!html.startsWith('<')) {
                const firstTagIdx = html.indexOf('<');
                if (firstTagIdx > 0) {
                    let leadText = result.substring(0, firstTagIdx);
                    keywords.forEach(kw => {
                        const escaped = escapeRegex(kw);
                        leadText = leadText.replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
                    });
                    result = leadText + result.substring(firstTagIdx);
                }
            }
            return result;
        }

        // Store current keywords for lazy rendering
        let currentKeywords = [];

        function renderResults(results, keywords) {
            const container = document.getElementById('results');
            const stats = document.getElementById('stats');
            currentKeywords = keywords;

            stats.textContent = `共找到 ${results.length} 筆資料` +
                (results.length !== QA_DATA.length ? ` / 全部 ${QA_DATA.length} 筆` : '');

            if (results.length === 0) {
                container.innerHTML = `
                    <div class="no-results">
                        <div class="icon">&#128269;</div>
                        <div>找不到符合的資料，請嘗試其他關鍵字</div>
                    </div>`;
                return;
            }

            // Only render headers initially; content is lazy-loaded on open
            container.innerHTML = results.map(item => `
                <div class="result-card" id="card-${item.id}" data-item-id="${item.id}">
                    <div class="result-header" onclick="toggleCard(${item.id})">
                        <span class="result-number">${item.number}</span>
                        <span class="result-dept">${escapeHtml(item.dept || item.dept_code)}</span>
                        <span class="result-title">${highlightPlainText(item.title, keywords)}</span>
                        <span class="result-toggle">&#9660;</span>
                    </div>
                    <div class="result-content">
                        <div class="result-content-body" id="body-${item.id}"></div>
                    </div>
                </div>
            `).join('');
        }

        function toggleCard(id) {
            const card = document.getElementById(`card-${id}`);
            const body = document.getElementById(`body-${id}`);

            // Lazy load rich content on first open
            if (!body.dataset.loaded) {
                const item = QA_DATA.find(d => d.id === id);
                if (item) {
                    const titleHtml = item.title_html
                        ? highlightRichHtml(item.title_html, currentKeywords)
                        : '';
                    const contentHtml = item.content_html
                        ? highlightRichHtml(item.content_html, currentKeywords)
                        : '';
                    body.innerHTML = titleHtml + contentHtml;
                    body.dataset.loaded = '1';
                }
            }

            card.classList.toggle('open');
        }

        // === Update / Convert ===
        async function updateData() {
            const btn = document.getElementById('btnUpdate');
            const origText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '&#9203; 轉檔中，請稍候...';

            try {
                const resp = await fetch('/api/convert', { method: 'POST' });
                const data = await resp.json();
                if (data.success) {
                    btn.innerHTML = '&#9989; 轉檔完成！重新載入中...';
                    // Reload data.js by reloading the page
                    setTimeout(() => location.reload(), 800);
                } else {
                    alert('轉檔失敗：' + data.message);
                    btn.innerHTML = origText;
                    btn.disabled = false;
                }
            } catch (e) {
                alert('無法連線到伺服器。\n\n請確認是否透過 server.py 或啟動.bat 開啟網頁。\n（直接雙擊 index.html 無法使用此功能）');
                btn.innerHTML = origText;
                btn.disabled = false;
            }
        }
        // === Share / QR Code ===
        async function showShareModal() {
            const modal = document.getElementById('shareModal');
            modal.classList.add('show');
            try {
                const resp = await fetch('/api/info', { method: 'POST' });
                const data = await resp.json();
                document.getElementById('shareUrl').textContent = data.url;
                // Generate QR code using a public API
                const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(data.url)}`;
                document.getElementById('qrImg').innerHTML = `<img src="${qrUrl}" width="200" height="200" alt="QR Code" style="border-radius:8px;">`;
            } catch(e) {
                document.getElementById('shareUrl').textContent = window.location.href;
                document.getElementById('qrImg').innerHTML = '<p style="color:#999;font-size:13px;">無法產生 QR Code（需透過伺服器啟動）</p>';
            }
        }

        function closeShareModal(event) {
            if (!event || event.target === event.currentTarget) {
                document.getElementById('shareModal').classList.remove('show');
            }
        }
    </script>
</body>
</html>
